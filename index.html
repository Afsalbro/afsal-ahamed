<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Afsal Ahamed | Senior Software Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #000;
        color: #dedbc8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        font-family: "DM Sans", sans-serif;
      }
      .font-display {
        font-family: "Playfair Display", serif;
      }
      .noise-overlay {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      .bg-noise {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e1e1e;
        border-radius: 4px;
      }

      /* ══════════════════════════════
             PRELOADER — full-page GIF + beautiful bar
         ══════════════════════════════ */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        overflow: hidden;
        transition: transform 1.15s cubic-bezier(0.76, 0, 0.24, 1);
        will-change: transform;
      }
      #preloader.slide-out {
        transform: translateY(100%);
        pointer-events: none;
      }

      #pl-gif {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.8;
      }

      /* deep vignette — heavier at bottom so bar reads clearly */
      #pl-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.45) 0%,
          rgba(0, 0, 0, 0.05) 30%,
          rgba(0, 0, 0, 0.55) 65%,
          rgba(0, 0, 0, 0.96) 100%
        );
        pointer-events: none;
      }

      /* ── bottom container ── */
      #pl-ui {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 clamp(28px, 6vw, 80px) clamp(44px, 8vh, 88px);
        gap: 0;
      }

      /* ── status text ── */
      #pl-loading-text {
        font-family: "DM Sans", sans-serif;
        font-size: clamp(9px, 1.4vw, 11px);
        font-weight: 300;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(222, 219, 200, 0.45);
        margin-bottom: 20px;
        transition: opacity 0.4s ease;
        text-align: center;
      }

      /* ══ THE BAR SYSTEM ══ */

      /* outermost glow halo behind the whole bar */
      #pl-bar-glow-outer {
        width: 100%;
        position: relative;
        margin-bottom: 10px;
        /* soft ambient glow beneath */
        filter: drop-shadow(0 0 18px rgba(222, 219, 200, 0.12))
          drop-shadow(0 0 6px rgba(222, 219, 200, 0.08));
      }

      /* track */
      #pl-bar-track {
        width: 100%;
        height: 3px;
        background: rgba(222, 219, 200, 0.07);
        border-radius: 999px;
        position: relative;
        overflow: visible;
      }

      /* segmented tick marks baked into the track */
      #pl-bar-track::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: repeating-linear-gradient(
          90deg,
          transparent,
          transparent calc(25% - 0.5px),
          rgba(222, 219, 200, 0.12) calc(25% - 0.5px),
          rgba(222, 219, 200, 0.12) calc(25% + 0.5px),
          transparent calc(25% + 0.5px)
        );
        pointer-events: none;
      }

      /* fill layer */
      #pl-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 0%;
        border-radius: 999px;
        overflow: hidden;
        /* base fill */
        background: linear-gradient(
          90deg,
          rgba(180, 178, 158, 0.6) 0%,
          rgba(222, 219, 200, 0.88) 60%,
          rgba(240, 238, 218, 1) 100%
        );
      }

      /* travelling shimmer inside the fill */
      #pl-bar-fill::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: -100%;
        width: 60%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0) 25%,
          rgba(255, 255, 255, 0.55) 50%,
          rgba(255, 255, 255, 0) 75%,
          transparent 100%
        );
        animation: fillShimmer 1.8s ease-in-out infinite;
      }
      @keyframes fillShimmer {
        0% {
          left: -60%;
        }
        100% {
          left: 110%;
        }
      }

      /* bright leading-edge orb */
      #pl-bar-head {
        position: absolute;
        top: 50%;
        left: 0%;
        transform: translate(-50%, -50%);
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #fff;
        box-shadow:
          0 0 6px 2px rgba(255, 255, 255, 0.9),
          0 0 18px 5px rgba(222, 219, 200, 0.55),
          0 0 38px 8px rgba(222, 219, 200, 0.22);
        opacity: 0; /* shown via JS once > 1% */
        transition: opacity 0.4s ease;
        pointer-events: none;
      }

      /* glow line that bleeds below the track */
      #pl-bar-bloom {
        position: absolute;
        bottom: -6px;
        left: 0;
        width: 0%;
        height: 14px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(222, 219, 200, 0.12) 40%,
          rgba(222, 219, 200, 0.28) 100%
        );
        filter: blur(6px);
        pointer-events: none;
      }

      /* ── percentage row (below bar) ── */
      #pl-bar-meta {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 0;
      }
      #pl-pct {
        font-family: "Playfair Display", serif;
        font-size: clamp(28px, 5vw, 52px);
        font-weight: 400;
        letter-spacing: -0.03em;
        color: rgba(222, 219, 200, 0.72);
        line-height: 1;
        font-style: italic;
        transition: opacity 0.2s ease;
      }
      #pl-phase-label {
        font-family: "DM Sans", sans-serif;
        font-size: clamp(8px, 1.2vw, 10px);
        font-weight: 300;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(222, 219, 200, 0.25);
        text-align: right;
        transition: opacity 0.4s ease;
      }

      /* ══ TECH CARDS ══ */
      .tech-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr;
      }
      @media (min-width: 640px) {
        .tech-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 1100px) {
        .tech-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      .tc {
        border-radius: 18px;
        padding: 28px 28px 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-height: 300px;
        position: relative;
        overflow: hidden;
        transition: transform 0.3s ease;
      }
      .tc:hover {
        transform: translateY(-2px);
      }
      .tc-dark {
        background: #101010;
        border: 1px solid rgba(222, 219, 200, 0.07);
      }
      .tc-orange {
        background: #bf4e38;
        border: none;
      }
      .tc-cream {
        background: #dedbc8;
        border: none;
      }
      .tc-charcoal {
        background: #181818;
        border: 1px solid rgba(222, 219, 200, 0.09);
      }
      .tc-num {
        position: absolute;
        top: 18px;
        right: 22px;
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 0.15em;
        opacity: 0.55;
      }
      .tc-dark .tc-num,
      .tc-charcoal .tc-num {
        color: #dedbc8;
      }
      .tc-orange .tc-num {
        color: #fff;
      }
      .tc-cream .tc-num {
        color: #111;
      }
      .tc-label {
        font-family: "Cormorant Garamond", serif;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.01em;
        line-height: 1.1;
      }
      .tc-dark .tc-label,
      .tc-charcoal .tc-label {
        color: #dedbc8;
      }
      .tc-orange .tc-label {
        color: #fff;
      }
      .tc-cream .tc-label {
        color: #111;
      }
      .tc-desc {
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 300;
        line-height: 1.85;
        letter-spacing: 0.025em;
      }
      .tc-dark .tc-desc,
      .tc-charcoal .tc-desc {
        color: rgba(222, 219, 200, 0.55);
      }
      .tc-orange .tc-desc {
        color: rgba(255, 255, 255, 0.82);
      }
      .tc-cream .tc-desc {
        color: rgba(17, 17, 17, 0.65);
      }
      .tc-tag {
        display: inline-flex;
        align-items: center;
        padding: 5px 14px;
        border-radius: 999px;
        font-family: "DM Sans", sans-serif;
        font-size: 10px;
        font-weight: 300;
        letter-spacing: 0.07em;
        width: fit-content;
        cursor: default;
      }
      .tag-outline-light {
        background: transparent;
        color: rgba(222, 219, 200, 0.65);
        border: 1px solid rgba(222, 219, 200, 0.28);
      }
      .tag-filled-light {
        background: #dedbc8;
        color: #111;
        border: none;
      }
      .tag-filled-black {
        background: #111;
        color: rgba(222, 219, 200, 0.75);
        border: none;
      }
      .tag-outline-white {
        background: transparent;
        color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.45);
      }
      .tag-outline-dark {
        background: transparent;
        color: rgba(17, 17, 17, 0.65);
        border: 1px solid rgba(17, 17, 17, 0.32);
      }

      /* ══ EXPERIENCE ══ */
      .exp-row {
        display: grid;
        grid-template-columns: 52px 1fr 160px;
        gap: 28px;
        padding: 36px 0;
        border-top: 1px solid rgba(222, 219, 200, 0.08);
        cursor: default;
      }
      .exp-row:last-child {
        border-bottom: 1px solid rgba(222, 219, 200, 0.08);
      }
      @media (max-width: 639px) {
        .exp-row {
          grid-template-columns: 40px 1fr;
          gap: 16px;
        }
        .exp-period-col {
          display: none;
        }
        .exp-period-mobile {
          display: block !important;
        }
      }
      .exp-period-mobile {
        display: none;
        font-family: "DM Sans", sans-serif;
        font-size: 10px;
        font-weight: 300;
        color: rgba(222, 219, 200, 0.45);
        letter-spacing: 0.08em;
        margin-top: 4px;
      }
      .exp-num-col {
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: rgba(222, 219, 200, 0.6);
        letter-spacing: 0.1em;
        padding-top: 10px;
      }
      .exp-company {
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: clamp(30px, 4.2vw, 58px);
        color: #dedbc8;
        letter-spacing: -0.025em;
        line-height: 1;
        transition: opacity 0.25s;
      }
      .exp-row:hover .exp-company {
        opacity: 0.7;
      }
      .exp-role {
        font-family: "Cormorant Garamond", serif;
        font-size: 16px;
        font-style: italic;
        color: rgba(222, 219, 200, 0.55);
        font-weight: 300;
        margin-top: 6px;
      }
      .exp-desc-text {
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 300;
        color: rgba(222, 219, 200, 0.45);
        line-height: 1.8;
        margin-top: 14px;
        max-width: 520px;
      }
      .exp-divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 18px;
        font-family: "DM Sans", sans-serif;
        font-size: 9px;
        font-weight: 300;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(222, 219, 200, 0.28);
      }
      .exp-divider::after {
        content: "";
        display: block;
        height: 1px;
        width: 36px;
        background: rgba(222, 219, 200, 0.18);
      }
      .exp-period-col {
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 300;
        color: rgba(222, 219, 200, 0.6);
        letter-spacing: 0.08em;
        text-align: right;
        padding-top: 10px;
        white-space: nowrap;
      }

      /* ══ SECTION HEADING ══ */
      .sh {
        font-family: "Playfair Display", serif;
        font-weight: 400;
        letter-spacing: -0.03em;
        line-height: 0.92;
        color: #dedbc8;
      }
      .sh em {
        font-style: italic;
        color: rgba(222, 219, 200, 0.42);
      }

      /* ══════════════════════════════
             FLOATING ICON NAVBAR
         ══════════════════════════════ */
      .floating-nav {
        position: fixed;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%) translateY(24px);
        display: flex;
        align-items: center;
        gap: 2px;
        background: #dedbc8;
        border: 1px solid rgba(17, 17, 17, 0.12);
        border-radius: 22px;
        padding: 7px 9px;
        z-index: 998;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
          0 24px 64px rgba(0, 0, 0, 0.55),
          0 1px 0 rgba(255, 255, 255, 0.45) inset,
          0 -1px 0 rgba(0, 0, 0, 0.08) inset;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.45s ease,
          transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .floating-nav.visible {
        opacity: 1;
        pointer-events: all;
        transform: translateX(-50%) translateY(0);
      }
      .nav-sep {
        width: 1px;
        height: 20px;
        background: rgba(17, 17, 17, 0.15);
        flex-shrink: 0;
        margin: 0 3px;
      }
      .nav-item {
        position: relative;
        border-radius: 13px;
        padding: 1.5px;
        cursor: pointer;
        background: transparent;
        transition: background 0.35s ease;
      }
      .nav-item.active {
        background: linear-gradient(
          150deg,
          #8a5200 0%,
          #d4920a 18%,
          #f5d060 38%,
          #fae388 50%,
          #e8b030 68%,
          #b07010 85%,
          #d4920a 100%
        );
        box-shadow:
          0 0 20px rgba(220, 170, 50, 0.45),
          0 0 8px rgba(245, 210, 80, 0.3);
        animation: goldShimmer 3s ease-in-out infinite;
        background-size: 200% 200%;
      }
      @keyframes goldShimmer {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      .nav-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 46px;
        height: 46px;
        border-radius: 11.5px;
        border: none;
        cursor: pointer;
        background: #1c1c1c;
        transition: background 0.25s ease;
        position: relative;
      }
      .nav-item:not(.active) .nav-btn {
        background: transparent;
      }
      .nav-item:not(.active):hover .nav-btn {
        background: rgba(17, 17, 17, 0.08);
      }
      .nav-btn svg {
        transition:
          opacity 0.25s ease,
          transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .nav-item:not(.active) .nav-btn svg path,
      .nav-item:not(.active) .nav-btn svg circle,
      .nav-item:not(.active) .nav-btn svg rect {
        stroke: #111 !important;
        opacity: 0.45;
      }
      .nav-item:not(.active):hover .nav-btn svg path,
      .nav-item:not(.active):hover .nav-btn svg circle,
      .nav-item:not(.active):hover .nav-btn svg rect {
        opacity: 0.8;
      }
      .nav-item.active .nav-btn svg path,
      .nav-item.active .nav-btn svg circle,
      .nav-item.active .nav-btn svg rect {
        stroke: #dedbc8 !important;
        opacity: 1;
      }
      .nav-item:not(.active):hover .nav-btn svg {
        transform: translateY(-1.5px);
      }
      .nav-dot {
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #c49a10;
        box-shadow: 0 0 6px rgba(196, 154, 16, 0.9);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .nav-item.active .nav-dot {
        opacity: 1;
      }
      .nav-tip {
        position: absolute;
        bottom: calc(100% + 14px);
        left: 50%;
        transform: translateX(-50%) translateY(6px);
        background: #1a1a1a;
        border: 1px solid rgba(222, 219, 200, 0.12);
        border-radius: 8px;
        padding: 5px 11px;
        font-family: "DM Sans", sans-serif;
        font-size: 10px;
        font-weight: 300;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(222, 219, 200, 0.75);
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      }
      .nav-tip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 4px solid transparent;
        border-top-color: rgba(222, 219, 200, 0.12);
      }
      .nav-item:hover .nav-tip {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ══ HERO NAV ══ */
      .hero-nav {
        display: flex;
        align-items: center;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
        white-space: nowrap;
      }
      .hero-nav::-webkit-scrollbar {
        display: none;
      }
      .hero-nav a {
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* ══ CONTACT ══ */
      .contact-split {
        width: 100%;
        background: #080808;
        min-height: 88vh;
        display: flex;
        flex-direction: column;
      }
      @media (min-width: 768px) {
        .contact-split {
          flex-direction: row;
        }
      }
      .contact-left {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: clamp(40px, 7vw, 110px);
        border-bottom: 1px solid rgba(222, 219, 200, 0.05);
      }
      @media (min-width: 768px) {
        .contact-left {
          flex: 0 0 48%;
          border-bottom: none;
          border-right: 1px solid rgba(222, 219, 200, 0.05);
        }
      }
      .contact-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: clamp(40px, 7vw, 110px);
        gap: 48px;
      }
      .contact-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(52px, 10.5vw, 148px);
        font-weight: 900;
        line-height: 0.85;
        letter-spacing: -0.045em;
        color: #dedbc8;
      }
      .contact-email-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        padding-bottom: 22px;
        border-bottom: 1px solid rgba(222, 219, 200, 0.1);
        transition: border-color 0.3s;
        gap: 16px;
        min-width: 0;
      }
      .contact-email-text {
        font-family: "Playfair Display", serif;
        font-size: clamp(16px, 3.2vw, 44px);
        font-weight: 400;
        color: #dedbc8;
        letter-spacing: -0.025em;
        word-break: break-all;
        min-width: 0;
        flex: 1;
      }
      .contact-arr {
        width: 52px;
        height: 52px;
        min-width: 52px;
        border-radius: 999px;
        border: 1px solid rgba(222, 219, 200, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: transform 0.3s ease;
      }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  </head>
  <body>
    <!-- ══ PRELOADER ══ -->
    <div id="preloader">

    <script>
      /* ══════════════════════════════
             PRELOADER LOGIC
             0–50 %  : SLOW   (~5 500 ms, ease-in-out)
             51–80 % : MEDIUM (~1 100 ms, linear)
             81–100% : FAST   (~  380 ms, linear)
             Exit: preloader slides DOWN, portfolio rises UP
         ══════════════════════════════ */
      (function () {
        const fill = document.getElementById("pl-bar-fill");
        const head = document.getElementById("pl-bar-head");
        const bloom = document.getElementById("pl-bar-bloom");
        const pctEl = document.getElementById("pl-pct");
        const textEl = document.getElementById("pl-loading-text");
        const phaseLabel = document.getElementById("pl-phase-label");
        const preloader = document.getElementById("preloader");
        const root = document.getElementById("root");

        const phases = [
          {
            from: 0,
            to: 50,
            ms: 5500,
            label: "Initialising systems...",
            phase: "Slow",
          },
          {
            from: 50,
            to: 80,
            ms: 1100,
            label: "Compiling portfolio...",
            phase: "Loading",
          },
          {
            from: 80,
            to: 100,
            ms: 380,
            label: "Almost there...",
            phase: "Fast",
          },
        ];

        function easeInOut(t) {
          return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function getProgress(elapsed) {
          let cum = 0;
          for (const ph of phases) {
            if (elapsed <= cum + ph.ms) {
              const t = (elapsed - cum) / ph.ms;
              const eased = ph.phase === "Slow" ? easeInOut(t) : t;
              return ph.from + (ph.to - ph.from) * eased;
            }
            cum += ph.ms;
          }
          return 100;
        }

        function getPhase(pct) {
          if (pct < 50) return phases[0];
          if (pct < 80) return phases[1];
          return phases[2];
        }

        let lastLabel = "";
        let lastPhase = "";
        const start = performance.now();

        function tick(now) {
          const progress = Math.min(100, getProgress(now - start));
          const display = Math.round(progress);
          const pct = progress / 100;

          // fill bar
          fill.style.width = progress + "%";
          bloom.style.width = progress + "%";

          // leading orb position
          head.style.left = progress + "%";
          head.style.opacity = progress > 1 ? "1" : "0";

          // big percentage
          pctEl.textContent = display + "%";

          // phase
          const ph = getPhase(display);
          if (ph.label !== lastLabel) {
            lastLabel = ph.label;
            textEl.style.opacity = "0";
            setTimeout(() => {
              textEl.textContent = ph.label;
              textEl.style.opacity = "1";
            }, 220);
          }
          if (ph.phase !== lastPhase) {
            lastPhase = ph.phase;
            phaseLabel.style.opacity = "0";
            setTimeout(() => {
              phaseLabel.textContent = ph.phase;
              phaseLabel.style.opacity = "1";
            }, 220);
          }

          if (progress < 100) {
            requestAnimationFrame(tick);
          } else {
            fill.style.width = "100%";
            bloom.style.width = "100%";
            head.style.left = "100%";
            pctEl.textContent = "100%";
            textEl.textContent = "Welcome.";
            phaseLabel.textContent = "";

            setTimeout(() => {
              preloader.classList.add("slide-out");
              root.style.opacity = "1";
              root.style.transform = "translateY(0)";
              setTimeout(() => {
                preloader.style.display = "none";
              }, 1250);
            }, 520);
          }
        }

        requestAnimationFrame(tick);
      })();

      /* ── nav helpers ── */
      function navTo(id) {
        if (id === "home") {
          window.scrollTo({ top: 0, behavior: "smooth" });
        } else {
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({ behavior: "smooth" });
        }
      }
      const fNav = document.getElementById("floatingNav");
      window.addEventListener(
        "scroll",
        () => {
          fNav.classList.toggle(
            "visible",
            window.scrollY > window.innerHeight * 0.75,
          );
        },
        { passive: true },
      );

      const SECTIONS = [
        "home",
        "about",
        "experience",
        "projects",
        "tech-stack",
        "contact",
      ];
      function setActive(id) {
        SECTIONS.forEach((s) => {
          const item = document.querySelector(`.nav-item[data-target="${s}"]`);
          if (item) item.classList.toggle("active", s === id);
        });
      }
      function getActiveSection() {
        if (window.scrollY < window.innerHeight * 0.4) return "home";
        const triggerY = window.scrollY + window.innerHeight * 0.4;
        let best = "home";
        for (const id of SECTIONS) {
          if (id === "home") continue;
          const el = document.getElementById(id);
          if (!el) continue;
          if (el.offsetTop <= triggerY) best = id;
        }
        return best;
      }
      window.addEventListener("scroll", () => setActive(getActiveSection()), {
        passive: true,
      });
      window.addEventListener("load", () => setActive(getActiveSection()));
    </script>
