<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Afsal Ahamed | Senior Software Engineer</title>
    <script type="text/javascript">
      (function (c, l, a, r, i, t, y) {
        c[a] =
          c[a] ||

            (c[a].q = c[a].q || []).push(arguments);
          };
        t = l.createElement(r);
        t.async = 1;

        y = l.getElementsByTagName(r)[0];

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@200;300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #000;
        color: #dedbc8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        font-family: "DM Sans", sans-serif;
      }
      .font-display {
        font-family: "Playfair Display", serif;
      }
      .noise-overlay {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      .bg-noise {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e1e1e;
        border-radius: 4px;
      }

      /* ══════════════════════════════
             GLOBAL GIF BACKGROUND
         ══════════════════════════════ */
      #global-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      #global-bg-gif {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.18;
        filter: saturate(0.7) brightness(0.9);
        mix-blend-mode: screen;
      }
      /* Vignette + dark tint over the GIF so content stays readable */
      #global-bg-overlay {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 80% at 50% 50%,
            transparent 30%,
            rgba(0, 0, 0, 0.72) 100%
          ),
          linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.55) 0%,
            rgba(0, 0, 0, 0.25) 40%,
            rgba(0, 0, 0, 0.25) 60%,
            rgba(0, 0, 0, 0.65) 100%
          );
      }

      /* ══════════════════════════════
             ENHANCED PRELOADER
         ══════════════════════════════ */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        overflow: hidden;
        transition: transform 1.15s cubic-bezier(0.76, 0, 0.24, 1);
        will-change: transform;
      }
      #preloader.slide-out {
        transform: translateY(100%);
        pointer-events: none;
      }

      #pl-gif {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.8;
      }

      #pl-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.45) 0%,
          rgba(0, 0, 0, 0.05) 30%,
          rgba(0, 0, 0, 0.55) 65%,
          rgba(0, 0, 0, 0.96) 100%
        );
        pointer-events: none;
      }

      #pl-ui {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 clamp(28px, 6vw, 80px) clamp(44px, 8vh, 88px);
        gap: 0;
      }

      #pl-loading-text {
        font-family: "DM Sans", sans-serif;
        font-size: clamp(9px, 1.4vw, 11px);
        font-weight: 300;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(222, 219, 200, 0.45);
        margin-bottom: 20px;
        transition: opacity 0.4s ease;
        text-align: center;
      }

      #pl-bar-glow-outer {
        width: 100%;
        position: relative;
        margin-bottom: 14px;
        padding: 6px 0;
        filter: drop-shadow(0 0 30px rgba(245, 210, 80, 0.22))
          drop-shadow(0 0 14px rgba(222, 219, 200, 0.14))
          drop-shadow(0 0 60px rgba(245, 210, 80, 0.12));
      }
      #pl-bar-glow-outer::before {
        content: "";
        position: absolute;
        inset: -10px -2px;
        background: radial-gradient(
          60% 120% at 50% 50%,
          rgba(245, 210, 80, 0.08),
          transparent 70%
        );
        pointer-events: none;
        animation: ambientPulse 3.2s ease-in-out infinite;
      }
      @keyframes ambientPulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }

      #pl-bar-track {
        width: 100%;
        height: 6px;
        background: linear-gradient(
          90deg,
          rgba(222, 219, 200, 0.04),
          rgba(222, 219, 200, 0.14),
          rgba(222, 219, 200, 0.04)
        );
        border-radius: 999px;
        position: relative;
        overflow: visible;
        box-shadow:
          0 0 24px rgba(0, 0, 0, 0.7) inset,
          0 1px 0 rgba(255, 255, 255, 0.07),
          0 -1px 0 rgba(0, 0, 0, 0.6);
      }
      #pl-bar-track::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent calc(10% - 0.5px),
          rgba(222, 219, 200, 0.12) calc(10% - 0.5px),
          rgba(222, 219, 200, 0.12) calc(10% + 0.5px),
          transparent calc(10% + 0.5px)
        );
        pointer-events: none;
        mask-image: linear-gradient(
          90deg,
          transparent,
          #000 12%,
          #000 88%,
          transparent
        );
        -webkit-mask-image: linear-gradient(
          90deg,
          transparent,
          #000 12%,
          #000 88%,
          transparent
        );
      }
      #pl-bar-track::after {
        content: "";
        position: absolute;
        left: 8%;
        right: 8%;
        top: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.22),
          transparent
        );
        border-radius: 999px;
        pointer-events: none;
      }

      #pl-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 0%;
        border-radius: 999px;
        overflow: hidden;
        background: linear-gradient(
          90deg,
          #b497ff 0%,
          #7ad6ff 22%,
          #e9efc0 45%,
          #ffd76b 68%,
          #ff8bd2 88%,
          #b497ff 100%
        );
        background-size: 200% 100%;
        animation:
          barPulse 2.2s ease-in-out infinite,
          prismShift 6s linear infinite;
        box-shadow:
          0 0 40px rgba(245, 210, 80, 0.7),
          0 0 80px rgba(245, 210, 80, 0.35),
          0 0 4px rgba(255, 246, 200, 0.9),
          0 1px 0 rgba(255, 255, 255, 0.5) inset,
          0 -1px 0 rgba(0, 0, 0, 0.25) inset;
      }
      @keyframes prismShift {
        0% {
          background-position: 0% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      #pl-bar-fill::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          115deg,
          rgba(255, 255, 255, 0.18) 0 6px,
          transparent 6px 14px
        );
        mix-blend-mode: overlay;
        animation: stripesMove 1.6s linear infinite;
        pointer-events: none;
      }
      @keyframes stripesMove {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 40px 0;
        }
      }
      @keyframes barPulse {
        0%,
        100% {
          filter: brightness(1) saturate(1);
        }
        50% {
          filter: brightness(1.2) saturate(1.3);
        }
      }
      #pl-bar-fill::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: -100%;
        width: 90%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0) 20%,
          rgba(255, 255, 255, 0.85) 50%,
          rgba(255, 255, 255, 0) 80%,
          transparent 100%
        );
        animation: fillShimmer 1.8s ease-in-out infinite;
      }
      @keyframes fillShimmer {
        0% {
          left: -90%;
        }
        100% {
          left: 130%;
        }
      }

      #pl-bar-head {
        position: absolute;
        top: 50%;
        left: 0%;
        transform: translate(-50%, -50%);
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          #fff 0%,
          #ffeaa0 35%,
          #f5d060 60%,
          rgba(245, 210, 80, 0.2) 100%
        );
        box-shadow:
          0 0 10px 3px rgba(255, 255, 255, 0.95),
          0 0 28px 7px rgba(245, 210, 80, 0.75),
          0 0 58px 12px rgba(222, 219, 200, 0.4),
          0 0 100px 16px rgba(245, 210, 80, 0.25);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
        animation: headGlow 1.6s ease-in-out infinite;
      }
      #pl-bar-head::before {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 1px solid rgba(255, 246, 200, 0.55);
        animation: ringPing 1.6s ease-out infinite;
      }
      @keyframes ringPing {
        0% {
          transform: scale(0.6);
          opacity: 0.9;
        }
        100% {
          transform: scale(2.2);
          opacity: 0;
        }
      }
      @keyframes headGlow {
        0%,
        100% {
          box-shadow:
            0 0 10px 3px rgba(255, 255, 255, 0.95),
            0 0 28px 7px rgba(245, 210, 80, 0.75),
            0 0 58px 12px rgba(222, 219, 200, 0.4),
            0 0 100px 16px rgba(245, 210, 80, 0.25);
        }
        50% {
          box-shadow:
            0 0 14px 5px rgba(255, 255, 255, 1),
            0 0 38px 10px rgba(245, 210, 80, 0.95),
            0 0 72px 16px rgba(222, 219, 200, 0.55),
            0 0 120px 20px rgba(245, 210, 80, 0.35);
        }
      }

      #pl-bar-bloom {
        position: absolute;
        bottom: -10px;
        left: 0;
        width: 0%;
        height: 26px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(245, 210, 80, 0.18) 30%,
          rgba(245, 210, 80, 0.42) 60%,
          rgba(255, 246, 200, 0.5) 100%
        );
        filter: blur(14px);
        pointer-events: none;
      }

      #pl-bar-meta {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 0;
      }
      #pl-pct {
        font-family: "Playfair Display", serif;
        font-size: clamp(28px, 5vw, 52px);
        font-weight: 400;
        letter-spacing: -0.03em;
        color: rgba(222, 219, 200, 0.72);
        line-height: 1;
        font-style: italic;
        transition: opacity 0.2s ease;
        text-shadow:
          0 0 20px rgba(245, 210, 80, 0.3),
          0 0 40px rgba(245, 210, 80, 0.1);
      }
      #pl-phase-label {
        font-family: "DM Sans", sans-serif;
        font-size: clamp(8px, 1.2vw, 10px);
        font-weight: 300;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(222, 219, 200, 0.25);
        text-align: right;
        transition: opacity 0.4s ease;
      }

      /* ══ TECH CARDS ══ */
      .tech-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
      }
      @media (min-width: 640px) {
        .tech-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 1100px) {
        .tech-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      .tc-new {
        border-radius: 22px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 320px;
        position: relative;
        isolation: isolate;
        transition:
          transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 0.5s ease;
        box-shadow:
          0 6px 28px rgba(0, 0, 0, 0.45),
          0 1px 0 rgba(255, 255, 255, 0.04) inset;
      }
      .tc-new::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 22px;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.18),
          rgba(255, 255, 255, 0.02) 30%,
          rgba(255, 255, 255, 0) 60%,
          rgba(245, 210, 80, 0.25) 100%
        );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        opacity: 0.6;
        transition: opacity 0.5s ease;
        z-index: 3;
      }
      .tc-new:hover {
        transform: translateY(-8px) scale(1.01);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.7),
          0 4px 18px rgba(245, 210, 80, 0.1),
          0 1px 0 rgba(255, 255, 255, 0.08) inset;
      }
      .tc-new:hover::before {
        opacity: 1;
      }

      .tc-header {
        padding: 26px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid;
        min-height: 110px;
        position: relative;
        overflow: hidden;
      }
      .tc-header::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -60%;
        width: 60%;
        height: 200%;
        background: linear-gradient(
          115deg,
          transparent 0%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 100%
        );
        transform: skewX(-12deg);
        transition: left 0.9s cubic-bezier(0.22, 1, 0.36, 1);
        pointer-events: none;
      }
      .tc-new:hover .tc-header::after {
        left: 130%;
      }
      .tc-header::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          80% 60% at 50% 0%,
          rgba(255, 255, 255, 0.12),
          transparent 70%
        );
        pointer-events: none;
        opacity: 0.7;
      }

      .tc-header-dark {
        background:
          radial-gradient(
            120% 100% at 0% 0%,
            rgba(245, 210, 80, 0.08),
            transparent 60%
          ),
          linear-gradient(135deg, #1d1d1d 0%, #0f0f0f 100%);
        border-bottom-color: rgba(245, 210, 80, 0.18);
      }
      .tc-header-orange {
        background:
          radial-gradient(
            120% 100% at 100% 0%,
            rgba(255, 220, 180, 0.25),
            transparent 60%
          ),
          linear-gradient(135deg, #e26a4f 0%, #b8442f 100%);
        border-bottom-color: rgba(255, 255, 255, 0.22);
      }
      .tc-header-cream {
        background:
          radial-gradient(
            120% 100% at 0% 0%,
            rgba(255, 255, 255, 0.6),
            transparent 60%
          ),
          linear-gradient(135deg, #f3f1de 0%, #d8d5c0 100%);
        border-bottom-color: rgba(17, 17, 17, 0.18);
      }
      .tc-header-charcoal {
        background:
          radial-gradient(
            120% 100% at 100% 0%,
            rgba(180, 160, 255, 0.08),
            transparent 60%
          ),
          linear-gradient(135deg, #2a2a2a 0%, #161616 100%);
        border-bottom-color: rgba(222, 219, 200, 0.2);
      }

      .tc-header-left {
        display: flex;
        align-items: center;
        gap: 16px;
        position: relative;
        z-index: 1;
      }

      .tc-num-new {
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.22em;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid currentColor;
        opacity: 0.85;
      }
      .tc-header-dark .tc-num-new,
      .tc-header-charcoal .tc-num-new {
        color: rgba(245, 210, 80, 0.7);
        border-color: rgba(245, 210, 80, 0.25);
        background: rgba(245, 210, 80, 0.05);
      }
      .tc-header-orange .tc-num-new {
        color: rgba(255, 255, 255, 0.92);
        border-color: rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.1);
      }
      .tc-header-cream .tc-num-new {
        color: rgba(17, 17, 17, 0.7);
        border-color: rgba(17, 17, 17, 0.25);
        background: rgba(17, 17, 17, 0.04);
      }

      .tc-label-new {
        font-family: "Cormorant Garamond", serif;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 0.01em;
        line-height: 1.05;
        position: relative;
        z-index: 1;
        transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .tc-new:hover .tc-label-new {
        transform: translateX(4px);
      }
      .tc-header-dark .tc-label-new,
      .tc-header-charcoal .tc-label-new {
        color: #f0eedd;
        text-shadow: 0 0 30px rgba(245, 210, 80, 0.18);
      }
      .tc-header-orange .tc-label-new {
        color: #fff;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      }
      .tc-header-cream .tc-label-new {
        color: #111;
      }

      .tc-body {
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        flex: 1;
        position: relative;
      }
      .tc-body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          80% 60% at 50% 100%,
          rgba(255, 255, 255, 0.04),
          transparent 70%
        );
        pointer-events: none;
      }
      .tc-body > * {
        position: relative;
        z-index: 1;
      }

      .tc-body-dark {
        background:
          radial-gradient(
            120% 80% at 100% 100%,
            rgba(245, 210, 80, 0.05),
            transparent 60%
          ),
          #0a0a0a;
      }
      .tc-body-orange {
        background:
          radial-gradient(
            120% 80% at 0% 100%,
            rgba(255, 200, 160, 0.1),
            transparent 60%
          ),
          #a8412e;
      }
      .tc-body-cream {
        background:
          radial-gradient(
            120% 80% at 100% 100%,
            rgba(255, 255, 255, 0.4),
            transparent 60%
          ),
          #d6d3c0;
      }
      .tc-body-charcoal {
        background:
          radial-gradient(
            120% 80% at 0% 100%,
            rgba(180, 160, 255, 0.05),
            transparent 60%
          ),
          #101010;
      }

      .tc-body::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(
            1.5px 1.5px at 20% 30%,
            rgba(255, 246, 200, 0.55),
            transparent 60%
          ),
          radial-gradient(
            1px 1px at 70% 60%,
            rgba(255, 246, 200, 0.4),
            transparent 60%
          ),
          radial-gradient(
            1.5px 1.5px at 40% 80%,
            rgba(255, 246, 200, 0.5),
            transparent 60%
          ),
          radial-gradient(
            1px 1px at 85% 25%,
            rgba(255, 246, 200, 0.45),
            transparent 60%
          );
        opacity: 0;
        transition: opacity 0.6s ease;
        animation: dustFloat 6s ease-in-out infinite;
        pointer-events: none;
      }
      .tc-body-cream::after,
      .tc-body-orange::after {
        background-image:
          radial-gradient(
            1.5px 1.5px at 20% 30%,
            rgba(255, 255, 255, 0.7),
            transparent 60%
          ),
          radial-gradient(
            1px 1px at 70% 60%,
            rgba(255, 255, 255, 0.55),
            transparent 60%
          ),
          radial-gradient(
            1.5px 1.5px at 40% 80%,
            rgba(255, 255, 255, 0.6),
            transparent 60%
          ),
          radial-gradient(
            1px 1px at 85% 25%,
            rgba(255, 255, 255, 0.55),
            transparent 60%
          );
      }
      .tc-new:hover .tc-body::after {
        opacity: 1;
      }
      @keyframes dustFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .tc-new::after {
        content: "";
        position: absolute;
        left: 12%;
        right: 12%;
        top: 109px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(245, 210, 80, 0.6),
          transparent
        );
        opacity: 0;
        transition:
          opacity 0.5s ease,
          left 0.6s ease,
          right 0.6s ease;
        pointer-events: none;

    <script>
      /* ══════════════════════════════
             PRELOADER LOGIC
         ══════════════════════════════ */
      (function () {
        const fill = document.getElementById("pl-bar-fill");
        const head = document.getElementById("pl-bar-head");
        const bloom = document.getElementById("pl-bar-bloom");
        const pctEl = document.getElementById("pl-pct");
        const textEl = document.getElementById("pl-loading-text");
        const phaseLabel = document.getElementById("pl-phase-label");
        const preloader = document.getElementById("preloader");
        const root = document.getElementById("root");

        const phases = [
          {
            from: 0,
            to: 50,
            ms: 5500,
            label: "Initialising systems...",
            phase: "Slow",
          },
          {
            from: 50,
            to: 80,
            ms: 1100,
            label: "Compiling portfolio...",
            phase: "Loading",
          },
          {
            from: 80,
            to: 100,
            ms: 380,
            label: "Almost there...",
            phase: "Fast",
          },
        ];

        function easeInOut(t) {
          return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function getProgress(elapsed) {
          let cum = 0;
          for (const ph of phases) {
            if (elapsed <= cum + ph.ms) {
              const t = (elapsed - cum) / ph.ms;
              const eased = ph.phase === "Slow" ? easeInOut(t) : t;
              return ph.from + (ph.to - ph.from) * eased;
            }
            cum += ph.ms;
          }
          return 100;
        }

        function getPhase(pct) {
          if (pct < 50) return phases[0];
          if (pct < 80) return phases[1];
          return phases[2];
        }

        let lastLabel = "",
          lastPhase = "";
        const start = performance.now();

        function tick(now) {
          const progress = Math.min(100, getProgress(now - start));
          const display = Math.round(progress);
          const pct = progress / 100;

          fill.style.width = progress + "%";
          bloom.style.width = progress + "%";
          head.style.left = progress + "%";
          head.style.opacity = progress > 1 ? "1" : "0";
          pctEl.textContent = display + "%";

          const ph = getPhase(display);
          if (ph.label !== lastLabel) {
            lastLabel = ph.label;
            textEl.style.opacity = "0";
            setTimeout(() => {
              textEl.textContent = ph.label;
              textEl.style.opacity = "1";
            }, 220);
          }
          if (ph.phase !== lastPhase) {
            lastPhase = ph.phase;
            phaseLabel.style.opacity = "0";
            setTimeout(() => {
              phaseLabel.textContent = ph.phase;
              phaseLabel.style.opacity = "1";
            }, 220);
          }

          if (progress < 100) {
            requestAnimationFrame(tick);
          } else {
            fill.style.width = "100%";
            bloom.style.width = "100%";
            head.style.left = "100%";
            pctEl.textContent = "100%";
            textEl.textContent = "Welcome.";
            phaseLabel.textContent = "";

            setTimeout(() => {
              preloader.classList.add("slide-out");
              root.style.opacity = "1";
              root.style.transform = "translateY(0)";
              setTimeout(() => {
                preloader.style.display = "none";
              }, 1250);
            }, 520);
          }
        }

        requestAnimationFrame(tick);
      })();

      function navTo(id) {
        if (id === "home") {
          window.scrollTo({ top: 0, behavior: "smooth" });
        } else {
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({ behavior: "smooth" });
        }
      }
      const fNav = document.getElementById("floatingNav");
      window.addEventListener(
        "scroll",
        () => {
          fNav.classList.toggle(
            "visible",
            window.scrollY > window.innerHeight * 0.75,
          );
        },
        { passive: true },
      );

      const SECTIONS = [
        "home",
        "about",
        "experience",
        "projects",
        "tech-stack",
        "contact",
      ];
      function setActive(id) {
        SECTIONS.forEach((s) => {
          const item = document.querySelector(`.nav-item[data-target="${s}"]`);
          if (item) item.classList.toggle("active", s === id);
        });
      }
      function getActiveSection() {
        if (window.scrollY < window.innerHeight * 0.4) return "home";
        const triggerY = window.scrollY + window.innerHeight * 0.4;
        let best = "home";
        for (const id of SECTIONS) {
          if (id === "home") continue;
          const el = document.getElementById(id);
          if (!el) continue;
          if (el.offsetTop <= triggerY) best = id;
        }
        return best;
      }
      window.addEventListener("scroll", () => setActive(getActiveSection()), {
        passive: true,
      });
      window.addEventListener("load", () => setActive(getActiveSection()));
    </script>

                  {w}

                    <span className="absolute top-[0.65em] -right-[0.3em] text-[0.31em] font-light">
                      *

        );

          >
            {segments.map((seg, si) =>
              seg.text

                  const idx = n++;
                  return (

                      key={`${si}-${wi}`}

                    >
                      <motion.div
                        initial={{ y: "100%" }}
                        animate={inView ? { y: 0 } : { y: "100%" }}
                        transition={{
                          delay: idx * 0.06,
                          duration: 0.8,
                          ease: [0.16, 1, 0.3, 1],
                        }}
                        className={`inline-block ${seg.cls || ""}`}

                        {word}

                  );
                }),
            )}

        );

      const RevealText = ({ text, className }) => {
        const ref = useRef(null);
        const { scrollYProgress } = useScroll({
          target: ref,
          offset: ["start 0.8", "end 0.2"],

        const chars = text.split("");
        return (

            {chars.map((c, i) => {
              const s = i / chars.length - 0.1,
                e = i / chars.length + 0.05;
              const op = useTransform(
                scrollYProgress,
                [Math.max(0, s), Math.min(1, e)],
                [0.15, 1],
              );
              return (
                <motion.span
                  key={i}
                  style={{ opacity: op }}
                  className="whitespace-pre"
                >
                  {c}
                </motion.span>
              );
            })}

        );
      };
